name: ⚡ [Matrix] Run Campaign Broadcast

on:
  workflow_dispatch:
    inputs:
      email_subject:
        description: 'Email Subject Line'
        required: true
        default: 'Sovereign Enterprise System Optimization Update'
      preview_text:
        description: 'Inbox Preview Snippet (Visible next to subject in inbox)'
        required: true
        default: 'Opening transmission vector via Celsius Omni-Stack Engine...'
      header_image_url:
        description: 'Header Banner Graphic Link (.webp/.jpg — 1200x630px recommended)'
        required: true
        default: 'https://celsiusmediagroup.co.za/assets/banner.webp'
      email_body_text:
        description: 'Main Body Text Content (Use <br> for line breaks, basic HTML tags supported)'
        required: true
        default: 'We are pleased to announce the successful calibration of our decentralized serverless infrastructure array. The distribution nodes are fully synchronized.'
      target_segment_tag:
        description: 'Target Filter Tag Group (Matches contact list tags)'
        required: true
        default: 'General'
      facebook_link:
        description: 'Footer: Facebook Profile/Page URL'
        required: false
        default: 'https://facebook.com/celsiusmediagroup'
      linkedin_link:
        description: 'Footer: LinkedIn Corporate URL'
        required: false
        default: 'https://linkedin.com/company/celsiusmediagroup'

jobs:
  execute-broadcast:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Workspace Repository
      uses: actions/checkout@v4

    - name: Setup System Core Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Matrix Core Computations
      env:
        # SMTP Server Authentication Passwords mapped directly to Secrets
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        
        # User input hooks from GitHub UI Panel
        CAMPAIGN_SUBJECT: ${{ github.event.inputs.email_subject }}
        CAMPAIGN_PREVIEW: ${{ github.event.inputs.preview_text }}
        CAMPAIGN_IMAGE: ${{ github.event.inputs.header_image_url }}
        CAMPAIGN_BODY: ${{ github.event.inputs.email_body_text }}
        TARGET_TAG: ${{ github.event.inputs.target_segment_tag }}
        LINK_FB: ${{ github.event.inputs.facebook_link }}
        LINK_LI: ${{ github.event.inputs.linkedin_link }}
      run: |
        python main.py
